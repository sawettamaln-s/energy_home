name: energy_home
description: "Home Energy Behavior Monitoring and Analysis System"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ของเดิมที่มีอยู่แล้ว (firebase_auth, cloud_firestore, fl_chart, ฯลฯ) คงไว้เหมือนเดิม

  # ----- เพิ่มสำหรับระบบแจ้งเตือน -----
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4          # ใช้คำนวณเวลาสำหรับ scheduled notification
  permission_handler: ^11.3.1  # ขอสิทธิ์แจ้งเตือนบน Android 13+ / iOS

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.3


  # UI
  fl_chart: ^0.69.0
  google_fonts: ^6.2.1
  iconsax: ^0.0.8

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.2
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # ----- สำหรับเทส widget ที่พึ่ง Firebase (AuthGate ฯลฯ) -----
  # เวอร์ชันต้องคู่กับ firebase_auth ^5.x / cloud_firestore ^5.x ด้านบน
  # (ดู compatibility table ที่ pub.dev ของแต่ละแพ็กเกจ)
  firebase_auth_mocks: ^0.14.2
  fake_cloud_firestore: ^3.1.0

flutter:
  uses-material-design: true